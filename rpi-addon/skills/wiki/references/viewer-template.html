<!DOCTYPE html>
<!--
  AutoWiki viewer — self-contained single-file renderer for a wiki/ Markdown tree.

  This template ships with an EMPTY data stash (#wiki-data, between the
  build-wiki-html sentinels). The build-wiki-html.sh script walks the wiki/
  directory, inlines every .md page into that stash as one JSON blob, and writes
  the result to wiki/index.html. The page then renders entirely client-side —
  no server, no fetch(), so it opens straight off disk (file://).

  Libraries load from CDN (marked, mermaid, highlight.js), so the first open
  needs network; browsers cache thereafter.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wiki</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
<style>
  :root {
    --bg: #ffffff; --fg: #1f2328; --muted: #656d76; --border: #d0d7de;
    --rail: #f6f8fa; --accent: #0969da; --accent-bg: #ddf4ff; --code-bg: #282c34;
    --max: 820px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117; --fg: #e6edf3; --muted: #8b949e; --border: #30363d;
      --rail: #0d1117; --accent: #2f81f7; --accent-bg: #182030; --code-bg: #161b22;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: grid; grid-template-columns: 280px minmax(0, 1fr) 220px; height: 100vh;
  }
  /* Left nav */
  #nav {
    border-right: 1px solid var(--border); background: var(--rail);
    overflow-y: auto; padding: 16px 12px;
  }
  #nav .brand { font-weight: 700; font-size: 15px; padding: 4px 8px 12px; }
  #nav .brand small { display: block; font-weight: 400; color: var(--muted); font-size: 12px; margin-top: 2px; }
  #search {
    width: 100%; padding: 6px 8px; margin-bottom: 12px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--bg); color: var(--fg); font-size: 13px;
  }
  #nav .section { font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
    color: var(--muted); margin: 14px 8px 4px; font-weight: 600; }
  #nav a {
    display: block; padding: 4px 8px; border-radius: 6px; color: var(--fg);
    text-decoration: none; font-size: 13.5px;
  }
  #nav a.sub { padding-left: 20px; color: var(--muted); }
  #nav a:hover { background: var(--accent-bg); }
  #nav a.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
  #nav a.hidden { display: none; }
  /* Center content */
  #main { overflow-y: auto; padding: 32px 40px 120px; }
  #content { max-width: var(--max); margin: 0 auto; }
  #breadcrumb { color: var(--muted); font-size: 12.5px; margin-bottom: 20px; }
  #content h1 { font-size: 28px; margin: .2em 0 .6em; padding-bottom: .3em; border-bottom: 1px solid var(--border); }
  #content h2 { font-size: 21px; margin: 1.6em 0 .5em; padding-bottom: .25em; border-bottom: 1px solid var(--border); }
  #content h3 { font-size: 17px; margin: 1.4em 0 .4em; }
  #content a { color: var(--accent); text-decoration: none; }
  #content a:hover { text-decoration: underline; }
  #content table { border-collapse: collapse; margin: 1em 0; display: block; overflow-x: auto; }
  #content th, #content td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
  #content th { background: var(--rail); }
  #content code { background: var(--accent-bg); padding: .15em .4em; border-radius: 4px; font-size: 85%;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  #content pre { background: var(--code-bg); border-radius: 8px; padding: 14px 16px; overflow-x: auto; }
  #content pre code { background: none; padding: 0; font-size: 13px; color: #abb2bf; }
  #content blockquote { margin: 1em 0; padding: 0 1em; color: var(--muted); border-left: 3px solid var(--border); }
  #content .mermaid { background: var(--rail); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin: 1em 0; text-align: center; }
  #content hr { border: 0; border-top: 1px solid var(--border); margin: 2em 0; }
  /* Right TOC */
  #toc { border-left: 1px solid var(--border); overflow-y: auto; padding: 32px 16px; }
  #toc .label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted);
    font-weight: 600; margin-bottom: 8px; }
  #toc a { display: block; color: var(--muted); text-decoration: none; font-size: 12.5px;
    padding: 3px 0; border-left: 2px solid transparent; padding-left: 10px; }
  #toc a.h3 { padding-left: 22px; }
  #toc a:hover { color: var(--fg); }
  @media (max-width: 1000px) { body { grid-template-columns: 240px 1fr; } #toc { display: none; } }
  @media (max-width: 680px) { body { grid-template-columns: 1fr; } #nav { display: none; } }
</style>
</head>
<body>
  <aside id="nav"></aside>
  <main id="main"><div id="breadcrumb"></div><article id="content"></article></main>
  <aside id="toc"></aside>

  <script id="wiki-data" type="application/json">
<!-- build-wiki-html:start (auto-generated — run build-wiki-html.sh to refresh) -->
{"meta":{"title":"Wiki"},"order":[],"pages":{}}
<!-- build-wiki-html:end -->
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script>
  (function () {
    // The stash carries the build-wiki-html sentinel comments; strip them before parsing.
    const data = JSON.parse(document.getElementById('wiki-data').textContent.replace(/<!--[\s\S]*?-->/g, '').trim());
    const pages = data.pages || {}, order = data.order || Object.keys(pages);
    const navEl = document.getElementById('nav');
    const contentEl = document.getElementById('content');
    const tocEl = document.getElementById('toc');
    const crumbEl = document.getElementById('breadcrumb');
    const darkMode = matchMedia('(prefers-color-scheme: dark)').matches;

    if (window.marked) marked.setOptions({ gfm: true });
    if (window.mermaid) mermaid.initialize({ startOnLoad: false, theme: darkMode ? 'dark' : 'default', securityLevel: 'loose' });
    const toHtml = (md) => window.marked ? marked.parse(md)
      : '<pre>' + md.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])) + '</pre>';

    const titleOf = (key) => {
      const m = (pages[key] || '').match(/^#\s+(.+)$/m);
      if (m) return m[1].trim();
      const base = key.split('/').pop().replace(/\.md$/, '');
      return base.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    };
    const sectionOf = (key) => key.includes('/') ? key.split('/')[0] : '';
    const labelCase = (s) => s.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

    // Resolve a relative .md link against the current page's directory.
    function resolve(base, href) {
      const dir = base.includes('/') ? base.slice(0, base.lastIndexOf('/')).split('/') : [];
      for (const seg of href.split('/')) {
        if (seg === '..') dir.pop();
        else if (seg !== '.' && seg !== '') dir.push(seg);
      }
      return dir.join('/');
    }

    // ---- Build the left nav, grouped by top-level section ----
    function buildNav(filter) {
      navEl.innerHTML = '';
      const brand = document.createElement('div');
      brand.className = 'brand';
      brand.innerHTML = (data.meta && data.meta.title || 'Wiki') +
        (data.meta && data.meta.generated ? '<small>generated ' + data.meta.generated + '</small>' : '');
      navEl.appendChild(brand);

      const search = document.createElement('input');
      search.id = 'search'; search.placeholder = 'Search…'; search.value = filter || '';
      search.oninput = () => buildNav(search.value.toLowerCase().trim());
      navEl.appendChild(search);
      search.focus(); search.setSelectionRange(search.value.length, search.value.length);

      const q = (filter || '').toLowerCase().trim();
      const match = (key) => !q || titleOf(key).toLowerCase().includes(q) || (pages[key] || '').toLowerCase().includes(q);

      let lastSection = null;
      for (const key of order) {
        if (!match(key)) continue;
        const sec = sectionOf(key);
        if (sec !== lastSection) {
          lastSection = sec;
          if (sec) {
            const h = document.createElement('div');
            h.className = 'section'; h.textContent = labelCase(sec);
            navEl.appendChild(h);
          }
        }
        const a = document.createElement('a');
        a.textContent = titleOf(key);
        a.href = '#' + key;
        if (key.split('/').length > 2) a.className = 'sub';
        if (key === current) a.classList.add('active');
        navEl.appendChild(a);
      }
    }

    // ---- Render a page ----
    let current = null;
    function render(key) {
      if (!pages[key]) key = order[0];
      current = key;

      contentEl.innerHTML = toHtml(pages[key]);

      // ```mermaid blocks → <div class="mermaid">
      contentEl.querySelectorAll('pre code.language-mermaid').forEach(code => {
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = code.textContent;
        code.closest('pre').replaceWith(div);
      });
      if (window.mermaid) try { mermaid.run({ nodes: contentEl.querySelectorAll('.mermaid') }); } catch (e) {}

      // syntax highlight remaining code blocks
      if (window.hljs) contentEl.querySelectorAll('pre code:not(.language-mermaid)').forEach(b => hljs.highlightElement(b));

      // rewrite inter-page .md links to hash navigation
      contentEl.querySelectorAll('a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (/^[a-z]+:|^#|^\/\//i.test(href)) return;
        const [path, anchor] = href.split('#');
        if (path && /\.md$/.test(path)) {
          const target = resolve(key, path);
          a.href = '#' + target + (anchor ? '::' + anchor : '');
        }
      });

      buildBreadcrumb(key);
      buildToc();
      buildNav(document.getElementById('search') ? document.getElementById('search').value : '');
      document.getElementById('main').scrollTop = 0;
    }

    function buildBreadcrumb(key) {
      const parts = key.replace(/\.md$/, '').split('/');
      crumbEl.textContent = (data.meta && data.meta.title ? data.meta.title + ' / ' : '') +
        parts.map(labelCase).join(' / ');
    }

    // ---- Right "On this page" TOC ----
    function buildToc() {
      tocEl.innerHTML = '';
      const heads = contentEl.querySelectorAll('h2, h3');
      if (!heads.length) return;
      const label = document.createElement('div');
      label.className = 'label'; label.textContent = 'On this page';
      tocEl.appendChild(label);
      heads.forEach((h, i) => {
        const id = 'h-' + i;
        h.id = id;
        const a = document.createElement('a');
        a.textContent = h.textContent;
        a.href = '#';
        if (h.tagName === 'H3') a.className = 'h3';
        a.onclick = (e) => { e.preventDefault(); h.scrollIntoView({ behavior: 'smooth' }); };
        tocEl.appendChild(a);
      });
    }

    function route() {
      const raw = decodeURIComponent(location.hash.slice(1));
      const [key, anchor] = raw.split('::');
      render(key || order[0]);
      if (anchor) {
        const t = [...contentEl.querySelectorAll('h1,h2,h3')]
          .find(h => h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') === anchor);
        if (t) t.scrollIntoView();
      }
    }

    window.addEventListener('hashchange', route);
    route();
  })();
  </script>
</body>
</html>
