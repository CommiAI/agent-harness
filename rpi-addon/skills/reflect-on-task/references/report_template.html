<!DOCTYPE html>
<!--
  Reflect-on-task report template for rpi-addon:reflect-on-task.
  The skill copies this to reflect-on-task/report.html and replaces the markers:
    {{TITLE}}       -> task slug / name
    {{HEADLINE}}    -> one-line takeaway (the single biggest lever for next time)
    {{PHASE_BARS}}  -> one .bar row per phase (see snippet below)
    {{ITERATIONS}}  -> one .iter card per post-implementation iteration (see snippet)
    {{GRADES}}      -> one .grade card per artifact: PRD, TDD, Outline (see snippet)

  The <style> mirrors the app design system (packages/ui) and the PR-walkthrough
  artifact: poimandres terminal palette, square corners (radius 0 everywhere),
  system-ui prose at weight 300, IBM Plex Mono reserved for chrome (badges,
  stats, bar %s, section labels). Keep it as-is so the report looks like the product.

  Per-phase bar (share of active time in this phase; annotate the label with your turns):
    <div class="bar">
      <span class="bar-label">3-tech-design <span class="bar-turns">· 12 turns</span></span>
      <span class="bar-track"><span class="bar-fill" style="width:67%"></span></span>
      <span class="bar-pct">67%</span>
    </div>

  Per-iteration card (a fix/change made AFTER implementation began):
    <section class="iter">
      <h3><span class="num">1</span> <name of the problem></h3>
      <dl>
        <dt>What changed</dt><dd><the concrete change, <code>file:line</code> if known></dd>
        <dt>Why</dt><dd><root cause / which doc should have caught it></dd>
      </dl>
    </section>

  Per-artifact grade card (set class to a|b|c|d|f|na to colour the badge + rule).
  The .gaps block is the actionable payoff: the concrete things this doc MISSED,
  phrased as what to look out for during that phase next time. One bullet per gap,
  each tied to evidence (an iteration #, a drifted requirement, a root cause).
    <section class="grade b">
      <h3>TDD <span class="badge">B · 88%</span></h3>
      <p class="sub">88% of the implementation this doc correctly anticipated</p>
      <dl>
        <dt>Completeness</dt><dd>92 — <evidence></dd>
        <dt>Accuracy</dt><dd>90 — <evidence></dd>
        <dt>Foresight</dt><dd>82 — <the thing it should have flagged></dd>
      </dl>
      <div class="gaps">
        <div class="gaps-label">Watch for next time</div>
        <ul>
          <li><the gap, e.g. "no idempotency/retry model for webhooks (→ iter 1)"></li>
          <li><another concrete miss to pre-empt next time></li>
        </ul>
      </div>
    </section>
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — Task Reflection</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700&display=swap");

  :root {
    --bg: #1b1e28; --bg-deep: #171922; --bg-alt: #303340;
    --row-open: #717cb418;
    --border: #303340; --guide: #303340;
    --text: #a6accd; --bright: #ffffff;
    --muted: rgba(166, 172, 205, 0.55);
    --accent: #add7ff; --accent-dim: rgba(173, 215, 255, 0.3);
    --mint: #5de4c7; --yellow: #fffac2; --blue: #89ddff;
    --rose: #d0679d; --pink: #f087bd;
    --mono: "IBM Plex Mono", Consolas, Monaco, "Courier New", monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; border-radius: 0; }
  ::selection { background: #717cb425; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  body {
    background: var(--bg); color: var(--text); font-family: var(--sans); margin: 0;
    font-size: 15px; font-weight: 300; line-height: 1.7; letter-spacing: 0.03em;
    -webkit-font-smoothing: antialiased; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }

  #topbar {
    position: sticky; top: 0; z-index: 20; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 10px 22px; background: rgba(27,30,40,0.95); backdrop-filter: blur(6px); border-bottom: 1px solid var(--border);
  }
  #topbar h1 { font-family: var(--mono); font-size: 11.5px; margin: 0; color: var(--accent); white-space: nowrap; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
  #topbar .sub { font-size: 12.5px; color: var(--muted); margin-left: auto; }

  #wrap { max-width: 920px; margin: 0 auto; padding: 26px 22px 120px; }

  #intro { border: 1px solid var(--border); padding: 24px 28px; margin-bottom: 32px; background: var(--bg-deep); }
  #intro h2 { margin: 0 0 12px; font-size: 22px; color: var(--accent); font-weight: 600; letter-spacing: -0.02em; line-height: 1.3; }
  #intro p { color: var(--text); margin: 0; max-width: 80ch; line-height: 1.9; }
  #intro p strong { color: var(--bright); font-weight: 600; }

  section.block { margin-bottom: 36px; }
  .section-label {
    font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin: 0 0 18px;
  }

  /* phase bars */
  .bar { display: grid; grid-template-columns: 220px 1fr 52px; align-items: center; gap: 14px; margin: 10px 0; }
  .bar-label { color: var(--bright); font-size: 14px; }
  .bar-turns { color: var(--muted); font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em; }
  .bar-track { background: var(--bg-deep); border: 1px solid var(--border); height: 16px; overflow: hidden; }
  .bar-fill { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--pink)); }
  .bar-pct { text-align: right; color: var(--accent); font-family: var(--mono); font-size: 12px; font-weight: 500; }

  /* iteration cards */
  .iter { background: var(--bg-deep); border: 1px solid var(--border); border-left: 2px solid var(--yellow); padding: 16px 20px; margin: 12px 0; }
  .iter h3 { margin: 0 0 12px; font-size: 15.5px; color: var(--bright); font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .iter .num { font-family: var(--mono); font-size: 11px; color: var(--yellow); border: 1px solid rgba(255,250,194,0.4); background: rgba(255,250,194,0.08); padding: 1px 7px; }

  /* grade cards */
  .grades { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); }
  .grade { background: var(--bg-deep); border: 1px solid var(--border); border-left: 2px solid var(--border); padding: 18px 20px; }
  .grade h3 { margin: 0 0 6px; font-size: 15px; color: var(--bright); font-weight: 600; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .grade .sub { margin: 0 0 14px; font-size: 12.5px; color: var(--muted); line-height: 1.6; }
  .badge {
    flex: none; font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.06em; padding: 2px 8px;
    text-transform: uppercase; border: 1px solid; white-space: nowrap;
  }
  .a .badge { color: var(--mint);   border-color: rgba(93,228,199,0.4);  background: rgba(93,228,199,0.1); }
  .a { border-left-color: var(--mint); }
  .b .badge { color: var(--blue);   border-color: rgba(137,221,255,0.4); background: rgba(137,221,255,0.1); }
  .b { border-left-color: var(--blue); }
  .c .badge { color: var(--yellow); border-color: rgba(255,250,194,0.4); background: rgba(255,250,194,0.08); }
  .c { border-left-color: var(--yellow); }
  .d .badge { color: var(--rose);   border-color: rgba(208,103,157,0.4); background: rgba(208,103,157,0.1); }
  .d { border-left-color: var(--rose); }
  .f .badge { color: var(--bg);     border-color: var(--rose);           background: var(--rose); }
  .f { border-left-color: var(--rose); }
  .na .badge { color: var(--muted); border-color: var(--border);         background: rgba(166,172,205,0.06); }
  .na { border-left-color: var(--guide); }

  dl { display: grid; grid-template-columns: auto 1fr; gap: 8px 16px; margin: 0; font-size: 13.5px; line-height: 1.6; }
  dt { color: var(--muted); font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; padding-top: 2px; white-space: nowrap; }
  dd { margin: 0; color: var(--text); }
  dd strong { color: var(--bright); font-weight: 600; }
  code { font-family: var(--mono); font-size: 0.85em; background: var(--bg-alt); padding: 0.1em 0.35em 0; letter-spacing: normal; }

  .gaps { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .gaps-label { font-family: var(--mono); font-size: 9.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--rose); margin-bottom: 7px; }
  .gaps ul { margin: 0; padding-left: 1.2em; font-size: 13px; line-height: 1.65; }
  .gaps li { margin: 0; color: var(--text); }
  .gaps li + li { margin-top: 4px; }
  .gaps li::marker { color: var(--rose); }
</style>
</head>
<body>

<div id="topbar">
  <h1>{{TITLE}} · TASK REFLECTION</h1>
  <span class="sub">how the design held up — and what to think harder about next time</span>
</div>

<div id="wrap">
  <div id="intro">
    <h2>Reflection</h2>
    <p>{{HEADLINE}}</p>
  </div>

  <section class="block">
    <div class="section-label">Time by phase · % of active time</div>
    {{PHASE_BARS}}
  </section>

  <section class="block">
    <div class="section-label">Iterations after implementation</div>
    {{ITERATIONS}}
  </section>

  <section class="block">
    <div class="section-label">Design-artifact report card</div>
    <div class="grades">
      {{GRADES}}
    </div>
  </section>
</div>

</body>
</html>
