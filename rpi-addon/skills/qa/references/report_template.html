<!DOCTYPE html>
<!--
  QA report template for rpi-addon:qa.
  The skill copies this to qa-report/index.html and replaces the markers:
    {{TITLE}}    -> run title / project name
    {{VERDICT}}  -> overall verdict, e.g. "3 passed · 1 failed"
    {{SUMMARY}}  -> one-line summary
    {{FLOWS}}    -> one .flow block per user flow (see the snippet below)
  GIFs live beside this file (qa-report/<flow>.gif), so relative src works
  when you open index.html in a browser.

  Per-flow block to inject in place of {{FLOWS}}:

    <section class="flow pass|warn|fail">
      <h2><span class="badge">PASS</span> Flow name</h2>
      <img src="<flow>.gif" alt="<flow>" loading="lazy">
      <dl>
        <dt>Verify</dt><dd>Expected outcome confirmed ✓</dd>
        <dt>Notes</dt><dd>No console errors</dd>
      </dl>
    </section>
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} — QA report</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 -apple-system, Segoe UI, Roboto, sans-serif;
         background: #0e0f13; color: #e6e6e6; }
  header { padding: 28px 32px; border-bottom: 1px solid #23252b; }
  h1 { margin: 0 0 6px; font-size: 20px; }
  .verdict { font-size: 14px; color: #9aa0aa; }
  main { padding: 24px 32px; display: grid; gap: 24px;
         grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); }
  .flow { background: #15171d; border: 1px solid #23252b; border-radius: 12px;
          padding: 16px; }
  .flow h2 { margin: 0 0 12px; font-size: 15px; display: flex; align-items: center; gap: 10px; }
  .flow img { width: 100%; border-radius: 8px; border: 1px solid #23252b; background: #000; }
  .badge { font-size: 11px; font-weight: 700; letter-spacing: .04em;
           padding: 2px 8px; border-radius: 999px; }
  .pass  .badge { background: #16331f; color: #5ad17e; }
  .warn  .badge { background: #36300f; color: #e7c84b; }
  .fail  .badge { background: #3a1717; color: #f0716f; }
  .pass  { border-left: 3px solid #5ad17e; }
  .warn  { border-left: 3px solid #e7c84b; }
  .fail  { border-left: 3px solid #f0716f; }
  dl { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; margin: 12px 0 0; }
  dt { color: #9aa0aa; }
  dd { margin: 0; }
</style>
</head>
<body>
<header>
  <h1>{{TITLE}} — QA report</h1>
  <div class="verdict">{{VERDICT}}</div>
  <div class="verdict">{{SUMMARY}}</div>
</header>
<main>
{{FLOWS}}
</main>
</body>
</html>
